name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Verify version files are synced
        run: python scripts/bump_version.py --check

      - name: Install desktop dependencies
        run: npm ci --prefix apps/desktop

      - name: Prepare electron-builder cache
        shell: pwsh
        run: |
          $winCodeSignDir = "$env:LOCALAPPDATA\electron-builder\Cache\winCodeSign"
          $darwinLibDir = Join-Path $winCodeSignDir "darwin\10.12\lib"
          New-Item -ItemType Directory -Force -Path $darwinLibDir | Out-Null
          "2.6.0" | Out-File -FilePath (Join-Path $winCodeSignDir ".version") -Encoding utf8
          foreach ($name in @("libcrypto.dylib", "libssl.dylib")) {
            $target = Join-Path $darwinLibDir $name
            if (-not (Test-Path $target)) {
              New-Item -ItemType File -Force -Path $target | Out-Null
            }
          }

      - name: Build Windows release
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_PLATFORM: "windows"
        run: npm run package:win

      - name: Archive unpacked app
        shell: pwsh
        run: |
          $archive = "dist/desktop/BriefVid-${env:GITHUB_REF_NAME}-win-x64-unpacked.zip"
          if (Test-Path $archive) {
            Remove-Item -LiteralPath $archive -Force
          }
          Compress-Archive -Path "dist/desktop/win-unpacked/*" -DestinationPath $archive

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/desktop/*.exe
            dist/desktop/*.zip
